defaults:
  - world_model@datasets.pusht_train.world_model: lewm
  - _self_ # Overrides from this file apply LAST

# Global Settings (Must be consistent across datasets for TSNE dimensions to match)
device: cuda
seed: 42
image_size: 224
patch_size: 14
frameskip: 5
cache_dir: null
dimensionality_reduction: pca

# Define multiple dataset-model pairs to visualize. Switch the world model per
# dataset via the `defaults` list above; the checkpoint name is set in the
# selected world_model config (world_model/lewm.yaml -> model_name: lewm-pusht).
datasets:
  pusht_train:
    dataset:
      # Local PushT dataset at $STABLEWM_HOME/datasets/lewm-pusht
      # (single pusht_expert_train.lance table; format auto-detected).
      dataset_name: lewm-pusht
      batch_size: 32
      num_workers: 8
      n_trajectories: 4
      n_steps: ${eval:'${..world_model.num_preds} + ${..world_model.history_size}'}
    dataset_group: pusht
