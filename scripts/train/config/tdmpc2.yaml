defaults:
  - _self_
  - launcher: local

hydra:
  job:
    chdir: true

# --- Run ---
output_model_name: tdmpc2_output
subdir: null
seed: 1

# --- Data ---
dataset_name: null
goal_obs_key: state
cache_dir: null
cache_dataset: true
batch_size: 256
num_workers: 16
train_split: 0.9

# --- Planning / MPPI parameters used only during evaluation ---
mpc: true
iterations: 12
num_samples: 1024
num_elites: 64
num_pi_trajs: 256
min_std: 0.01
max_std: 0.1
temperature: 0.5

# --- Model ---
# Self-contained, instantiable model spec. TDMPC2 takes the whole cfg as its
# single argument, so its config lives under `model.cfg`. `_recursive_: false`
# passes `cfg` through to `TDMPC2(cfg=...)` untouched. `action_dim`/`extra_dims`
# are filled in at runtime from the dataset. TDMPC2 builds its CNN/MLP submodules
# internally, so `TDMPC2` is the only `_target_` needed. Saved via
# `save_pretrained(config=cfg.model)` and reloaded by `load_pretrained`.
model:
  _target_: stable_worldmodel.wm.tdmpc2.TDMPC2
  _recursive_: false
  cfg:
    image_size: 64
    wm:
      horizon: 5
      mlp_dim: 384
      enc_dim: 256
      simnorm_dim: 8
      num_q: 5
      rho: 0.5
      tau: 0.01
      consistency_coef: 20.0
      reward_coef: 0.1
      value_coef: 0.1
      discount: 0.99
      uncertainty_penalty: 0.5
      entropy_coef: 1e-4
      name: tdmpc2

      num_bins: 101
      vmin: -6
      vmax: 2

      encoding:
        state: 128

# --- Optimizer ---
optimizer:
  type: AdamW
  lr: 3e-4
enc_lr_scale: 0.3

# --- Trainer ---
trainer:
  max_epochs: 250
  strategy: auto
  devices: 1
  accelerator: gpu
  precision: 16-mixed
  gradient_clip_val: 20.0

# --- Logging ---
wandb:
  enable: True
  project: null
  entity: null
