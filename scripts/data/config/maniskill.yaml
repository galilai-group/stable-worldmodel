defaults:
  - _self_
  - override hydra/launcher: submitit_slurm

hydra:
  output_subdir: null
  mode: MULTIRUN
  launcher:
    max_num_timeout: 999
    gpus_per_node: 1
    tasks_per_node: 1
    cpus_per_task: 8
    mem_gb: 48
    timeout_min: 1440
    partition: long
    signal_delay_s: 120
  run:
    dir: .

env_name: swm/PickCubeManiSkill-v0
dataset_name: maniskill/pick_cube_random
cache_dir: null

world:
  num_envs: 4
  max_episode_steps: 100
  image_shape: [224, 224]

seed: 3072
num_traj: 1000

options: null
