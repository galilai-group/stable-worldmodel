defaults:
  - launcher: local
  - solver: cem
  - objective: goal_mse
  - _self_

world:
  env_name: swm/ReacherDMControl-v0
  num_envs: ${eval.num_eval}
  max_episode_steps: ??? # make sure it's >= eval_budget
  task: qpos_match

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action

seed: 42
policy: random # ckpt name or random

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5 # frameskip
  # history_len: 3  # context frames (block timesteps) fed to the world model;
  #                 # match the training history_size. Rollout-based models only
  #                 # (LeWM/PLDM/PreJEPA) — TD-MPC2 requires the default of 1.

# evaluation from dataset (replay expert trajectories)
eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: dmc/reacher_random.h5
  callables:
    # -- set state
    - method: set_state
      args:
        qpos:
          value: qpos
        qvel:
          value: qvel

    - method: set_target_qpos
      args:
        target_qpos:
          value: goal_qpos

output:
  filename: dmc_results.txt
